name: Daily note queue publish

on:
  workflow_dispatch:
  push:
    paths:
      - 'note_articles/run-now.txt'
  schedule:
    # JST 11:13, 14:27, 16:41, 18:18, 21:52
    - cron: '13 2 * * *'
    - cron: '27 5 * * *'
    - cron: '41 7 * * *'
    - cron: '18 9 * * *'
    - cron: '52 12 * * *'

permissions:
  contents: write

concurrency:
  group: note-auto-publish
  cancel-in-progress: false

jobs:
  note:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_NOTE_AUTOMATION != 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Publish one queued note article
        env:
          NOTE_COMPARISON_URL: ${{ vars.NOTE_COMPARISON_URL || 'https://vpscomparehub.com/money/' }}
          NOTE_STORAGE_STATE_JSON: ${{ secrets.NOTE_STORAGE_STATE_JSON }}
          NOTE_PUBLISH_MODE: ${{ vars.NOTE_PUBLISH_MODE || 'publish' }}
          NOTE_PUBLISH_QUEUE_MAX: ${{ vars.NOTE_PUBLISH_QUEUE_MAX || '1' }}
          NOTE_HEADLESS: 'true'
        run: |
          test -n "$NOTE_STORAGE_STATE_JSON"
          npm run note:publish:queue
      - name: Commit queue state
        run: |
          git config user.name "tekito-bot"
          git config user.email "actions@users.noreply.github.com"
          if [[ -n "$(git status --porcelain note_articles/)" ]]; then
            git add note_articles/
            git commit -m "chore(note): publish queued article $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No note article changes."
          fi
