name: Daily note article publish

on:
  workflow_dispatch:
  push:
    paths:
      - 'note_articles/run-now.txt'
  schedule:
    # Temporary schedule smoke test for 2026-06-19 JST 12:10/12:15.
    - cron: '10,15 3 * * *'
    # Fallback windows for JST 11:13, 14:27, 16:41, 18:18, 21:52.
    # GitHub may delay or drop individual schedule events, so each slot has retries.
    - cron: '13,23,33,43,53 2 * * *'
    - cron: '27,37,47,57 5 * * *'
    - cron: '7 6 * * *'
    - cron: '41,51 7 * * *'
    - cron: '1,11,21 8 * * *'
    - cron: '18,28,38,48,58 9 * * *'
    - cron: '52 12 * * *'
    - cron: '2,12,22,32 13 * * *'

permissions:
  contents: write

concurrency:
  group: note-auto-publish
  cancel-in-progress: false

jobs:
  note:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_NOTE_AUTOMATION != 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Check scheduled publish slot
        id: note_slot
        env:
          NOTE_SCHEDULE_SLOTS_JST: ${{ vars.NOTE_SCHEDULE_SLOTS_JST || '11:13,14:27,16:41,18:18,21:52' }}
          NOTE_SCHEDULE_WINDOW_MINUTES: ${{ vars.NOTE_SCHEDULE_WINDOW_MINUTES || '50' }}
        run: node scripts/note/should-run-scheduled-note.mjs
      - name: Skip outside publish slot
        if: ${{ steps.note_slot.outputs.should_run != 'true' }}
        run: |
          echo "Skipping note publish: ${{ steps.note_slot.outputs.reason }} (${{ steps.note_slot.outputs.slot_key }})"
      - if: ${{ steps.note_slot.outputs.should_run == 'true' }}
        run: npm ci
      - name: Install Playwright Chromium
        if: ${{ steps.note_slot.outputs.should_run == 'true' }}
        run: npx playwright install --with-deps chromium
      - name: Generate and publish note article
        if: ${{ steps.note_slot.outputs.should_run == 'true' }}
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          NOTE_KEYWORD_SELECTION: ${{ vars.NOTE_KEYWORD_SELECTION || 'google' }}
          RAKKO_API_KEY: ${{ secrets.RAKKO_API_KEY }}
          RAKKO_USE_EXPANSION: ${{ vars.RAKKO_USE_EXPANSION || 'true' }}
          RAKKO_USE_OTHER_KEYWORDS: ${{ vars.RAKKO_USE_OTHER_KEYWORDS || 'false' }}
          RAKKO_EXPAND_LIMIT: ${{ vars.RAKKO_EXPAND_LIMIT || '50' }}
          RAKKO_BROWSER_HEADLESS: ${{ vars.RAKKO_BROWSER_HEADLESS || 'true' }}
          RAKKO_BROWSER_MAX_TARGETS: ${{ vars.RAKKO_BROWSER_MAX_TARGETS || '15' }}
          RAKKO_BROWSER_MODES: ${{ vars.RAKKO_BROWSER_MODES || 'suggestKeywords,relatedKeywords' }}
          RAKKO_BROWSER_USE_SHORT_NAMES: ${{ vars.RAKKO_BROWSER_USE_SHORT_NAMES || 'false' }}
          GOOGLE_BROWSER_HEADLESS: ${{ vars.GOOGLE_BROWSER_HEADLESS || 'true' }}
          GOOGLE_BROWSER_MAX_TARGETS: ${{ vars.GOOGLE_BROWSER_MAX_TARGETS || '1' }}
          GOOGLE_BROWSER_USE_SHORT_NAMES: ${{ vars.GOOGLE_BROWSER_USE_SHORT_NAMES || 'false' }}
          GOOGLE_SUGGESTION_PROBES: ${{ vars.GOOGLE_SUGGESTION_PROBES || '10' }}
          RAKKO_MAX_TARGETS: ${{ vars.RAKKO_MAX_TARGETS || '30' }}
          RAKKO_MIN_VOLUME: ${{ vars.RAKKO_MIN_VOLUME || '0' }}
          RAKKO_MAX_VOLUME: ${{ vars.RAKKO_MAX_VOLUME || '1000' }}
          RAKKO_MAX_SEO_DIFFICULTY: ${{ vars.RAKKO_MAX_SEO_DIFFICULTY || '45' }}
          NOTE_COMPARISON_URL: ${{ vars.NOTE_COMPARISON_URL || 'https://vpscomparehub.com/money/' }}
          NOTE_STORAGE_STATE_JSON: ${{ secrets.NOTE_STORAGE_STATE_JSON || vars.NOTE_STORAGE_STATE_JSON }}
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_PUBLISH_MODE: ${{ vars.NOTE_PUBLISH_MODE || 'publish' }}
        run: |
          npm run note:check-config
          npm run note:daily
      - name: Commit generated article and state
        if: ${{ steps.note_slot.outputs.should_run == 'true' }}
        run: |
          git config user.name "tekito-bot"
          git config user.email "actions@users.noreply.github.com"
          if [[ -n "$(git status --porcelain note_articles/)" ]]; then
            git add note_articles/
            git commit -m "chore(note): daily article pipeline $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No note article changes."
          fi
