name: Daily note queue publish

on:
  workflow_dispatch:
  push:
    paths:
      - 'note_articles/run-now.txt'
  schedule:
    # Every 15 minutes from JST 11:00 to 23:45. The script decides whether a post is actually due.
    - cron: '*/15 2-14 * * *'

permissions:
  contents: write

concurrency:
  group: note-auto-publish
  cancel-in-progress: false

jobs:
  note:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_NOTE_AUTOMATION != 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Calculate publish count
        id: publish_count
        env:
          NOTE_DAILY_TARGET: ${{ vars.NOTE_DAILY_TARGET || '5' }}
          NOTE_SCHEDULE_SLOTS_JST: ${{ vars.NOTE_SCHEDULE_SLOTS_JST || '11:13,14:27,16:41,18:18,21:52' }}
        run: node scripts/note/calculate-note-publish-max.mjs
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Publish queued note articles
        env:
          NOTE_COMPARISON_URL: ${{ vars.NOTE_COMPARISON_URL || 'https://vpscomparehub.com/money/' }}
          NOTE_STORAGE_STATE_JSON: ${{ secrets.NOTE_STORAGE_STATE_JSON }}
          NOTE_PUBLISH_MODE: ${{ vars.NOTE_PUBLISH_MODE || 'publish' }}
          NOTE_PUBLISH_QUEUE_MAX: ${{ steps.publish_count.outputs.max }}
          NOTE_HEADLESS: 'true'
        run: |
          echo "publish_count=${NOTE_PUBLISH_QUEUE_MAX}"
          if [ "$NOTE_PUBLISH_QUEUE_MAX" = "0" ]; then
            echo "No queued note publish is due for this JST slot."
            exit 0
          fi
          test -n "$NOTE_STORAGE_STATE_JSON"
          npm run note:publish:queue
      - name: Commit queue state
        run: |
          git config user.name "tekito-bot"
          git config user.email "actions@users.noreply.github.com"
          if [[ -n "$(git status --porcelain note_articles/)" ]]; then
            git add note_articles/
            git commit -m "chore(note): publish queued article $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No note article changes."
          fi
